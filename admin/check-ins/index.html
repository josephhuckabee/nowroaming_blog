---
layout: layouts/base.njk
title: Check-ins
description: Manage Now Roaming map check-ins.
eleventyExcludeFromCollections: true
robots: noindex, nofollow
---

<link rel="stylesheet" href="/vendor/leaflet/leaflet.css">

<main class="admin-shell" id="main-content" data-admin-page="checkins">
  <section class="admin-panel">
    <div class="admin-topbar">
      <div>
        <p class="eyebrow">Private CMS</p>
        <h1>Check-ins</h1>
      </div>
      <div class="admin-actions">
        <a class="button secondary" href="/admin/routes/">Routes</a>
        <a class="button secondary" href="/admin/media/">Media</a>
        <a class="button secondary" href="/map/">Public map</a>
        <button class="button secondary" type="button" data-admin-logout>Logout</button>
      </div>
    </div>

    <div class="admin-app checkin-workspace" hidden>
      <form class="settings-grid checkin-form" data-checkin-form>
        <input type="hidden" name="id">
        <input type="hidden" name="latitude">
        <input type="hidden" name="longitude">
        <input type="hidden" name="cover_image_url">
        <input type="hidden" name="photos" value="[]">
        <input type="hidden" name="related_post_slug">

        <label>Location name <input name="location_name" placeholder="Tokyo, Japan" required></label>
        <label>Date <input name="visited_at" type="date" required></label>
        <label>Journal note <textarea name="journal_note" rows="4" placeholder="A short field note from this stop."></textarea></label>

        <div class="asset-picker" data-checkin-cover>
          <strong>Photos</strong>
          <div data-checkin-cover-preview><span>No image selected</span></div>
          <input type="file" data-checkin-cover-file accept="image/jpeg,image/png,image/webp,image/gif,image/svg+xml" multiple>
          <button type="button" data-checkin-cover-button>Upload photos</button>
          <p class="admin-message" data-checkin-cover-message></p>
        </div>

        <label>Related post
          <input name="related_post_search" list="checkin-post-options" placeholder="Search posts">
        </label>
        <datalist id="checkin-post-options" data-checkin-post-options></datalist>

        <label>Visibility
          <select name="is_public">
            <option value="true">Public</option>
            <option value="false">Private</option>
          </select>
        </label>
        <label>Sort order <input name="sort_order" type="number" step="1" value="0"></label>

        <div class="admin-actions stacked">
          <button class="button" type="submit">Publish check-in</button>
          <button class="button secondary" type="button" data-use-current-location>Use current location</button>
          <button class="button secondary" type="button" data-new-checkin>New check-in</button>
        </div>
        <p class="admin-message" data-checkin-message></p>
      </form>

      <div class="checkin-map-panel">
        <div class="admin-toolbar">
          <input data-checkin-location-search type="search" placeholder="Search a place" aria-label="Search location">
          <button class="button secondary" type="button" data-search-location>Search map</button>
        </div>
        <div class="checkin-map" data-checkin-map aria-label="Interactive check-in map"></div>
        <p class="admin-message" data-checkin-map-message>Drop a pin on the map to set coordinates.</p>
        <div class="admin-table" data-checkin-list></div>
      </div>
    </div>
  </section>
</main>

<script>
  window.NOW_ROAMING_CMS = {{ cms | json | safe }};
</script>
<script type="module" src="/js/cms-admin.js"></script>
