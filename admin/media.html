---
layout: layouts/base.njk
title: Media Library
description: Manage Now Roaming media uploads.
eleventyExcludeFromCollections: true
robots: noindex, nofollow
---

<main class="admin-shell" id="main-content" data-admin-page="media">
  <section class="admin-panel">
    <div class="admin-topbar">
      <div>
        <p class="eyebrow">Private CMS</p>
        <h1>Media</h1>
      </div>
      <div class="admin-actions">
        <a class="button secondary" href="/admin/posts/">Posts</a>
        <a class="button secondary" href="/admin/check-ins/">Check-ins</a>
        <a class="button secondary" href="/admin/settings/">Settings</a>
        <button class="button secondary" type="button" data-admin-logout>Logout</button>
      </div>
    </div>

    <form class="admin-login" data-admin-login hidden>
      <h2>Admin login</h2>
      <label>Email <input name="email" type="email" autocomplete="email" required></label>
      <label>Password <input name="password" type="password" autocomplete="current-password" required></label>
      <button class="button" type="submit">Login</button>
      <p class="admin-message" data-admin-message></p>
    </form>

    <div class="admin-app" data-media-app hidden>
      <div class="media-drop" data-media-drop>
        <input data-media-input type="file" multiple accept=".jpg,.jpeg,.png,.webp,.gif,.svg,.pdf">
        <p>Drop images or PDFs here, or choose files.</p>
        <progress data-upload-progress value="0" max="100" hidden></progress>
      </div>
      <div class="admin-toolbar">
        <input data-media-search type="search" placeholder="Search media" aria-label="Search media">
        <input data-media-folder type="text" placeholder="Folder name" aria-label="Upload folder">
        <select data-media-filter aria-label="Filter media type">
          <option value="">All media</option>
          <option value="image">Images</option>
          <option value="pdf">PDFs</option>
        </select>
      </div>
      <div class="media-grid" data-media-grid></div>
    </div>
  </section>
</main>

<script>
  window.NOW_ROAMING_CMS = {{ cms | json | safe }};
</script>

<script type="module" src="/js/cms-admin.js"></script>
