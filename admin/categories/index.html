---
layout: layouts/base.njk
title: Categories
description: Manage Now Roaming categories.
eleventyExcludeFromCollections: true
robots: noindex, nofollow
---

<main class="admin-shell" id="main-content" data-admin-page="categories">
  <section class="admin-panel">
    <div class="admin-topbar">
      <div>
        <p class="eyebrow">Private CMS</p>
        <h1>Categories</h1>
      </div>
      <div class="admin-actions">
        <a class="button secondary" href="/admin/posts/">Posts</a>
        <a class="button secondary" href="/admin/tags/">Tags</a>
        <button class="button secondary" type="button" data-admin-logout>Logout</button>
      </div>
    </div>

    <div class="admin-app manager-grid" hidden>
      <form class="settings-grid" data-term-form>
        <input type="hidden" name="id">
        <label>Name <input name="name" required></label>
        <label>Slug <input name="slug" required></label>
        <label>Description <textarea name="description" rows="4"></textarea></label>
        <button class="button" type="submit">Save category</button>
        <p class="admin-message" data-term-message></p>
      </form>
      <div class="admin-table" data-term-list></div>
    </div>
  </section>
</main>

<script>
  window.NOW_ROAMING_CMS = {{ cms | json | safe }};
</script>
<script type="module" src="/js/cms-admin.js"></script>
