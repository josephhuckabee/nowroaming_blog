---
layout: layouts/base.njk
title: Drafts
description: Manage draft Now Roaming posts.
eleventyExcludeFromCollections: true
robots: noindex, nofollow
---

<main class="admin-shell" id="main-content" data-admin-page="drafts">
  <section class="admin-panel">
    <div class="admin-topbar">
      <div>
        <p class="eyebrow">Private CMS</p>
        <h1>Drafts</h1>
      </div>
      <div class="admin-actions">
        <a class="button secondary" href="/admin/posts/">Posts</a>
        <a class="button secondary" href="/admin/media/">Media</a>
        <button class="button secondary" type="button" data-admin-logout>Logout</button>
      </div>
    </div>

    <div class="admin-app" hidden>
      <div class="admin-toolbar">
        <a class="button" href="/admin/posts/new/">New post</a>
        <input data-post-search type="search" placeholder="Search drafts" aria-label="Search drafts">
        <select data-post-status aria-label="Filter by status">
          <option value="draft">Drafts</option>
        </select>
        <select data-post-category aria-label="Filter by category">
          <option value="">All categories</option>
        </select>
        <select data-post-sort aria-label="Sort drafts">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
      </div>
      <div class="admin-table" data-post-table></div>
    </div>
  </section>
</main>

<script>
  window.NOW_ROAMING_CMS = {{ cms | json | safe }};
</script>
<script type="module" src="/js/cms-admin.js"></script>
