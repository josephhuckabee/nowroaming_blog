---
layout: layouts/base.njk
title: Posts
description: Manage Now Roaming posts.
eleventyExcludeFromCollections: true
robots: noindex, nofollow
---

<main class="admin-shell" id="main-content" data-admin-page="posts">
  <section class="admin-panel">
    <div class="admin-topbar">
      <div>
        <p class="eyebrow">Private CMS</p>
        <h1>Posts</h1>
      </div>
      <div class="admin-actions">
        <a class="button secondary" href="/admin/">Dashboard</a>
        <a class="button secondary" href="/admin/media/">Media</a>
        <a class="button secondary" href="/admin/settings/">Settings</a>
        <button class="button secondary" type="button" data-admin-logout>Logout</button>
      </div>
    </div>

    <div class="admin-app" data-admin-app hidden>
      <div class="admin-toolbar">
        <a class="button" href="/admin/posts/new/">New post</a>
        <input data-post-search type="search" placeholder="Search posts" aria-label="Search posts">
        <select data-post-status aria-label="Filter by status">
          <option value="">All statuses</option>
          <option value="draft">Drafts</option>
          <option value="published">Published</option>
          <option value="scheduled">Scheduled</option>
        </select>
        <select data-post-category aria-label="Filter by category">
          <option value="">All categories</option>
        </select>
        <select data-post-sort aria-label="Sort posts">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
      </div>
      <div class="admin-table" data-post-table></div>
    </div>
  </section>
</main>

<script>
  window.NOW_ROAMING_CMS = {{ cms | json | safe }};
</script>
<script type="module" src="/js/cms-admin.js"></script>
