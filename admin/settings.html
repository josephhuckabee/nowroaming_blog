---
layout: layouts/base.njk
title: Blog Settings
description: Manage Now Roaming site settings.
eleventyExcludeFromCollections: true
robots: noindex, nofollow
---

<main class="admin-shell" id="main-content" data-admin-page="settings">
  <section class="admin-panel">
    <div class="admin-topbar">
      <div>
        <p class="eyebrow">Private CMS</p>
        <h1>Settings</h1>
      </div>
      <div class="admin-actions">
        <a class="button secondary" href="/admin/posts/">Posts</a>
        <button class="button secondary" type="button" data-admin-logout>Logout</button>
      </div>
    </div>

    <form class="admin-login" data-admin-login>
      <h2>Admin login</h2>
      <label>Email <input name="email" type="email" autocomplete="email" required></label>
      <label>Password <input name="password" type="password" autocomplete="current-password" required></label>
      <button class="button" type="submit">Login</button>
      <p class="admin-message" data-admin-message></p>
    </form>

    <form class="settings-grid admin-app" data-settings-form hidden>
      <label>Blog title <input name="blog_title"></label>
      <label>Blog description <textarea name="blog_description" rows="3"></textarea></label>
      <label>Homepage hero text <textarea name="hero_text" rows="3"></textarea></label>
      <label>Profile image URL <input name="profile_image_url" type="url"></label>
      <label>Author name <input name="author_name"></label>
      <label>Author bio <textarea name="author_bio" rows="3"></textarea></label>
      <label>Social links JSON <textarea name="social_links" rows="5" placeholder='{"instagram":"https://..."}'></textarea></label>
      <label>SEO defaults JSON <textarea name="seo_defaults" rows="5" placeholder='{"title":"Now Roaming"}'></textarea></label>
      <label>Analytics IDs JSON <textarea name="analytics_ids" rows="4"></textarea></label>
      <label>Contact information <textarea name="contact_info" rows="3"></textarea></label>
      <button class="button" type="submit">Save settings</button>
      <p class="admin-message" data-settings-message></p>
    </form>
  </section>
</main>

<script>
  window.NOW_ROAMING_CMS = {{ cms | json | safe }};
</script>
<script type="module" src="/js/cms-admin.js"></script>
